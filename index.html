<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta name="favicon" content="img/favicon.png" />

    <link rel="stylesheet" href="css/normalize.css" />

  <body>
    <header>
      <div class="container">
        <img src="img/chips.svg" alt="" id="image-chips" />
        <img src="img/cards.svg" alt="" id="image-cards" />
      </div>
      <h1>Casino</h1>
      <p>Display Slab</p>
    </header>

    <main>

      <section id="specimen-1">
          <div>Heart</div>
          <div>Diamond</div>
          <div>Club</div>
          <div>Spade</div>
      </section>

      <img src="img/club.svg" alt="" class="image-suit" />

      <section id="specimen-2">
          <div>Four Queens</div>
          <div>Straight to the Jack</div>
          <div>Ace High</div>
          <div>Kings Over Twos</div>
      </section>

      <img src="img/diamond.svg" alt="" class="image-suit" />

      <section id="specimen-3">
          <div>
            ABCDEFGHIJKLM<br />
            NOPQRSTUVWXYZ<br />
            0123456789<br />
            ()#$<>/=?![]
          </div>
      </section>

      <img src="img/heart.svg" alt="" class="image-suit" />

      <section id="specimen-4">
          <div>&</div>
      </section>

      <img src="img/spade.svg" alt="" class="image-suit" />

      <section id="download">
         <div>
          <a href="font/casino.ttf">
            <span>Download</span>
          </a>
          <div>
            <span>(on the house)</span>
          </div>
        </div>
      </section>

    <footer>
      <a href="https://andrewmillen.com" target="_blank" rel="noopener noreferrer">
        <img src="img/am-chip.svg" alt="" id="image-am-chip" />

      <div>
        Designed by Andrew Millen<br />
        for Simple Focus
      </div>
    </footer>
